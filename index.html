    .alert { padding: 0.7rem 1rem; border-radius: 8px; font-size: 0.875rem; margin-bottom: 0.875rem; }
    .alert-success { background: rgba(34,197,94,0.1);  border: 1px solid rgba(34,197,94,0.28);  color: #86efac; }
    .alert-error   { background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.28);  color: #fca5a5; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

<body>

<div id="root">
  <div class="splash">
    <div class="splash-icon">🏀</div>
    <div class="splash-title">Playoff Pools</div>
    <div id="splash-sub" class="splash-sub">Loading...</div>
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useMemo } = React;

// ── Firebase ──────────────────────────────────────────────────────────────────
let db = null;
try {
  if (typeof firebase === 'undefined') throw new Error('Firebase SDK not loaded');
  if (!firebase.apps.length) {
    firebase.initializeApp({
      apiKey:            "AIzaSyC2DTRVp8Ab8FlQQ_o00pVkB-Qd-8ts5-A",
      authDomain:        "playoff-pool-eb483.firebaseapp.com",
      projectId:         "playoff-pool-eb483",
      storageBucket:     "playoff-pool-eb483.firebasestorage.app",
      messagingSenderId: "519124882635",
      appId:             "1:519124882635:web:b04c814ff7b6382804f74e"
    });
  }
  db = firebase.firestore();
} catch (e) {
  console.error('Firebase init error:', e);
  const el = document.getElementById('splash-sub');
  if (el) { el.textContent = 'Firebase error: ' + e.message; el.style.color = '#fca5a5'; }
}

const STS = () => firebase.firestore.FieldValue.serverTimestamp();
const TSFrom = (d) => firebase.firestore.Timestamp.fromDate(new Date(d));

// ── Constants ─────────────────────────────────────────────────────────────────
const ADMIN_PW    = 'BenIsAdmin2026';
const ROUND_LABEL = { 1: 'Round 1', 2: 'Conf Semis', 3: 'Conf Finals', 4: 'NBA Finals' };
const WIN_PTS     = { 1: 5, 2: 6, 3: 6, 4: 7 };
const GAME_PTS    = { 1: 2, 2: 2, 3: 3, 4: 4 };

// ── Helpers ───────────────────────────────────────────────────────────────────
function getStatus(s) {
  if (!s || !s.status) return 'pending';
  if (s.status === 'open' && s.tipOffTime) {
    const t = s.tipOffTime.toDate ? s.tipOffTime.toDate() : new Date(s.tipOffTime);
    if (Date.now() >= t.getTime()) return 'locked';
  }
  return s.status;
}

function calcPts(pick, result, round) {
  if (!pick || !pick.winner || !result || !result.winner) return null;
  if (pick.winner !== result.winner) return 0;
  let p = WIN_PTS[round] || 0;
  if (Number(pick.games) === Number(result.games)) p += GAME_PTS[round] || 0;
  return p;
}

function countdown(ts) {
  if (!ts) return null;
  const t = ts.toDate ? ts.toDate() : new Date(ts);
  const diff = t.getTime() - Date.now();
  if (diff <= 0) return null;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  if (h > 48) return `${Math.floor(h / 24)}d ${h % 24}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

function confBadge(c) {
  if (c === 'East') return 'badge badge-east';
  if (c === 'West') return 'badge badge-west';
  if (c === 'Finals') return 'badge badge-finals';
  return 'badge badge-pending';
}

// ── useCollection ─────────────────────────────────────────────────────────────
function useCollection(col) {
  const [docs,  setDocs]  = useState([]);
  const [error, setError] = useState(null);
  useEffect(() => {
    if (!db) { setError('Firebase not initialised'); return; }
    const unsub = db.collection(col).onSnapshot(
      snap => setDocs(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
      err  => { console.error(col, err); setError(err.message); }
    );
    return unsub;
  }, [col]);
  return [docs, error];
}

// ── Score calc ────────────────────────────────────────────────────────────────
function buildLeaderboard(players, series, picks) {
  return players
    .filter(p => p.active !== false)
    .map(player => {
      let pts = 0;
      series.filter(s => s.status === 'completed' && s.result).forEach(s => {
        const pick = picks.find(pk => pk.playerId === player.id && pk.seriesId === s.id);
        const p = calcPts(pick, s.result, s.round);
        if (p) pts += p;
        if (s.round === 4 && pick && pick.mvp && s.result.mvp &&
            pick.mvp.trim().toLowerCase() === s.result.mvp.trim().toLowerCase()) {
          pts += 0.5;
        }
      });
      return { ...player, pts };
    })
    .sort((a, b) => b.pts - a.pts || a.name.localeCompare(b.name));
}

// ══ App ═══════════════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState('home');
  const [tick, setTick] = useState(0);

  const [players, playersErr] = useCollection('players');
  const [series,  seriesErr]  = useCollection('series');
  const [picks,   picksErr]   = useCollection('picks');

  useEffect(() => {
    const id = setInterval(() => setTick(t => t + 1), 30000);
    return () => clearInterval(id);
  }, []);

  const dbError = playersErr || seriesErr || picksErr;
  const leaderboard = useMemo(() => buildLeaderboard(players, series, picks), [players, series, picks]);
  const openCount   = useMemo(() => series.filter(s => getStatus(s) === 'open').length, [series, tick]);

  if (dbError) {
    return (
      <div className="splash">
        <div className="splash-icon">⚠️</div>
        <div className="splash-title">Connection error</div>
        <div className="splash-sub" style={{color:'#fca5a5'}}>{dbError}</div>
        <div className="splash-sub" style={{marginTop:8}}>Check your internet connection and reload.</div>
      </div>
    );
  }

  return (
    <div>
      <nav className="nav">
        <span className="nav-brand">🏀 Playoff Pools</span>
        <button className={`nav-btn ${view==='home'?'active':''}`}  onClick={() => setView('home')}>Standings</button>
        <button className={`nav-btn ${view==='picks'?'active':''}`} onClick={() => setView('picks')}>
          My Picks{openCount > 0 && <span className="nav-pip">{openCount}</span>}
        </button>
        <button className={`nav-btn ${view==='admin'?'active':''}`} onClick={() => setView('admin')}>Admin</button>
      </nav>
      {view === 'home'  && <HomeView  series={series} leaderboard={leaderboard} picks={picks} tick={tick} />}
      {view === 'picks' && <PicksView players={players.filter(p => p.active !== false)} series={series} picks={picks} tick={tick} />}
      {view === 'admin' && <AdminView players={players} series={series} picks={picks} />}
    </div>
  );
}

// ══ Home ══════════════════════════════════════════════════════════════════════
function HomeView({ series, leaderboard, picks, tick }) {
  return (
    <div className="container">
      <div className="page-title">2026 NBA Playoffs 🏆</div>
      <div className="card">
        <div className="card-title">Standings</div>
        {leaderboard.length === 0
          ? <p className="empty-state">No players yet — Ben needs to add them in Admin.</p>
          : <table className="lb">
              <thead><tr><th>#</th><th>Player</th><th style={{textAlign:'right'}}>Pts</th></tr></thead>
              <tbody>
                {leaderboard.map((p, i) => (
                  <tr key={p.id}>
                    <td className={`rank ${['rank-1','rank-2','rank-3'][i]||''}`}>{i+1}</td>
                    <td style={{fontWeight:500}}>{p.name}</td>
                    <td className={`pts ${p.pts===0?'pts-zero':''}`}>{p.pts}</td>
                  </tr>
                ))}
              </tbody>
            </table>
        }
      </div>
      {[1,2,3,4].map(round => {
        const rs = series.filter(s => s.round===round).sort((a,b) => {
          const o = {open:0,locked:1,completed:2,pending:3};
          return (o[getStatus(a)]??3)-(o[getStatus(b)]??3);
        });
        if (!rs.length) return null;
        return (
          <div key={round}>
            <div className="section-label">{ROUND_LABEL[round]}</div>
            {rs.map(s => <SeriesCard key={s.id} s={s} tick={tick} />)}
          </div>
        );
      })}
    </div>
  );
}

function SeriesCard({ s, tick }) {
  const status = getStatus(s);
  const timer  = countdown(s.tipOffTime);
  return (
    <div className={`s-card ${status}`}>
      <div className="s-header">
        <div>
          <div className="s-matchup">{s.team1&&s.team2?`${s.team1} vs ${s.team2}`:'TBD vs TBD'}</div>
          <div className="s-sub">{ROUND_LABEL[s.round]} · {s.conference}</div>
          {status==='open'&&timer&&<div className={`timer ${parseInt(timer)<2?'urgent':''}`}>⏱ Picks close in {timer}</div>}
          {status==='completed'&&s.result&&(
            <div className="result-line">✓ {s.result.winner} wins in {s.result.games}{s.result.mvp?` · MVP: ${s.result.mvp}`:''}</div>
          )}
        </div>
        <div className="s-right">
          <span className={confBadge(s.conference)}>{s.conference}</span>
          <span className={`badge badge-${status}`}>{status}</span>
        </div>
      </div>
    </div>
  );
}

// ══ Picks ═════════════════════════════════════════════════════════════════════
function PicksView({ players, series, picks, tick }) {
  const [playerId, setPlayerId] = useState('');
  const [pin,      setPin]      = useState('');
  const [authed,   setAuthed]   = useState(false);
  const [err,      setErr]      = useState('');
  const [draft,    setDraft]    = useState({});
  const [saving,   setSaving]   = useState(false);
  const [flash,    setFlash]    = useState({});

  const player     = players.find(p => p.id === playerId);
  const myPicks    = picks.filter(p => p.playerId === playerId);
  const openSeries = series.filter(s => getStatus(s)==='open').sort((a,b)=>a.round-b.round);

  function login() {
    if (!player)                            { setErr('Select your name'); return; }
    if (String(pin)!==String(player.pin))   { setErr('Wrong PIN — ask Ben if you forgot'); return; }
    setErr(''); setAuthed(true);
    const ex = {};
    picks.filter(p=>p.playerId===playerId).forEach(p=>{
      ex[p.seriesId]={winner:p.winner,games:Number(p.games),mvp:p.mvp||''};
    });
    setDraft(ex);
  }

  function setPick(sid,key,val){ setDraft(prev=>({...prev,[sid]:{...(prev[sid]||{}),[key]:val}})); }

  async function submit(seriesId) {
    const d=draft[seriesId]||{};
    if (!d.winner){ setErr('Choose a winner first'); return; }
    if (!d.games) { setErr('Choose number of games'); return; }
    setErr(''); setSaving(true);
    try {
      await db.collection('picks').doc(`${playerId}_${seriesId}`).set({
        playerId,seriesId,winner:d.winner,games:Number(d.games),mvp:d.mvp||'',submittedAt:STS()
      });
      setFlash(prev=>({...prev,[seriesId]:true}));
      setTimeout(()=>setFlash(prev=>({...prev,[seriesId]:false})),2500);
    } catch(e){ setErr('Save failed: '+e.message); }
    setSaving(false);
  }

  if (!authed) {
    return (
      <div className="container">
        <div className="page-title">My Picks</div>
        <div className="card" style={{maxWidth:380}}>
          <div className="form-group">
            <label className="form-label">Your name</label>
            <select value={playerId} onChange={e=>{setPlayerId(e.target.value);setPin('');setErr('');}}>
              <option value="">Select your name...</option>
              {players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </select>
          </div>
          <div className="form-group">
            <label className="form-label">Your 4-digit PIN</label>
            <input type="password" maxLength={4} value={pin}
              onChange={e=>setPin(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&login()}
              placeholder="••••" />
          </div>
          {err&&<div className="alert alert-error">{err}</div>}
          <button className="btn btn-primary w-full" onClick={login}>Let's go →</button>
          <p style={{color:'var(--muted)',fontSize:'0.78rem',marginTop:'0.75rem'}}>Don't know your PIN? Ask Ben.</p>
        </div>
      </div>
    );
  }

  return (
    <div className="container">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.5rem'}}>
        <div className="page-title" style={{marginBottom:0}}>Hey, {player?.name}! 👋</div>
        <button className="btn btn-ghost btn-sm" onClick={()=>{setAuthed(false);setPlayerId('');setPin('');setDraft({});setErr('');}}>Switch</button>
      </div>
      {err&&<div className="alert alert-error">{err}</div>}
      {openSeries.length===0
        ?<div className="alert alert-info">No picks open right now — check back soon!</div>
        :openSeries.map(s=>{
          const d=draft[s.id]||{};
          const sub=myPicks.find(p=>p.seriesId===s.id);
          return (
            <div key={s.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'0.875rem'}}>
                <div>
                  <div style={{fontWeight:600,fontSize:'1rem'}}>{s.team1} vs {s.team2}</div>
                  <div style={{fontSize:'0.72rem',color:'var(--muted)',marginTop:2}}>{ROUND_LABEL[s.round]} · {s.conference}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4}}>
                  {flash[s.id]&&<span className="save-flash">✓ Saved!</span>}
                  {sub&&!flash[s.id]&&<span style={{fontSize:'0.72rem',color:'var(--muted)'}}>Saved: <strong style={{color:'var(--text)'}}>{sub.winner} in {sub.games}</strong></span>}
                </div>
              </div>
              <div className="form-label">Who wins?</div>
              <div className="pick-opts">
                {[s.team1,s.team2].map(t=>(
                  <div key={t} className={`pick-opt ${d.winner===t?'sel':''}`} onClick={()=>setPick(s.id,'winner',t)}>{t}</div>
                ))}
              </div>
              <div className="form-label" style={{marginTop:'0.75rem'}}>In how many games?</div>
              <div className="games-opts">
                {[4,5,6,7].map(g=>(
                  <div key={g} className={`games-opt ${d.games===g?'sel':''}`} onClick={()=>setPick(s.id,'games',g)}>{g}</div>
                ))}
              </div>
              {s.round===4&&(
                <div className="form-group" style={{marginTop:'0.75rem'}}>
                  <label className="form-label">Finals MVP — tiebreaker, 0.5 pts</label>
                  <input type="text" placeholder="Player name..." value={d.mvp||''} onChange={e=>setPick(s.id,'mvp',e.target.value)} />
                </div>
              )}
              <button className="btn btn-primary" style={{marginTop:'0.875rem'}}
                onClick={()=>submit(s.id)} disabled={saving||!d.winner||!d.games}>
                {sub?'Update pick':'Submit pick'}
              </button>
            </div>
          );
        })
      }
      {myPicks.length>0&&(
        <div className="card" style={{marginTop:'0.5rem'}}>
          <div className="card-title">All my picks</div>
          {series.filter(s=>myPicks.some(p=>p.seriesId===s.id)).sort((a,b)=>a.round-b.round).map(s=>{
            const pick=myPicks.find(p=>p.seriesId===s.id);
            const pts=s.status==='completed'?calcPts(pick,s.result,s.round):null;
            return (
              <div key={s.id} className="my-pick-row">
                <div>
                  <div style={{fontSize:'0.875rem',fontWeight:500}}>{s.team1} vs {s.team2}</div>
                  <div style={{fontSize:'0.7rem',color:'var(--muted)'}}>{ROUND_LABEL[s.round]}</div>
                </div>
                <div style={{textAlign:'right',display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}}>
                  <span style={{fontSize:'0.875rem',fontWeight:500}}>{pick.winner} in {pick.games}</span>
                  {pts!==null&&<span className={`pts-badge ${pts>0?'pts-pos':'pts-zero'}`}>{pts} pts</span>}
                  {pts===null&&<span style={{fontSize:'0.7rem',color:'var(--muted)'}}>pending</span>}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ══ Admin ═════════════════════════════════════════════════════════════════════
function AdminView({ players, series, picks }) {
  const [pw,pw_]=[...useState('')];
  const [authed,authed_]=[...useState(false)];
  const [err,err_]=[...useState('')];
  const [tab,tab_]=[...useState('players')];

  function login(){ if(pw===ADMIN_PW){authed_(true);err_('');}else err_('Wrong password'); }

  if (!authed) {
    return (
      <div className="container">
        <div className="page-title">Admin</div>
        <div className="card" style={{maxWidth:340}}>
          <div className="form-group">
            <label className="form-label">Admin password</label>
            <input type="password" value={pw} onChange={e=>pw_(e.target.value)} onKeyDown={e=>e.key==='Enter'&&login()} placeholder="Password" />
          </div>
          {err&&<div className="alert alert-error">{err}</div>}
          <button className="btn btn-primary w-full" onClick={login}>Enter</button>
        </div>
      </div>
    );
  }

  return (
    <div className="container">
      <div className="page-title">⚙️ Admin</div>
      <div className="tabs">
        {['players','series','results'].map(t=>(
          <button key={t} className={`tab ${tab===t?'active':''}`} onClick={()=>tab_(t)} style={{textTransform:'capitalize'}}>{t}</button>
        ))}
      </div>
      {tab==='players'&&<AdminPlayers players={players} picks={picks} />}
      {tab==='series' &&<AdminSeries  series={series} />}
      {tab==='results'&&<AdminResults series={series} />}
    </div>
  );
}

function AdminPlayers({ players, picks }) {
  const [name,setName]=useState('');
  const [pin,setPin]  =useState('');
  const [msg,setMsg]  =useState({text:'',type:'success'});
  const flash=(text,type='success')=>{setMsg({text,type});setTimeout(()=>setMsg({text:'',type:'success'}),3500);};

  async function add() {
    if(!name.trim())    {flash('Enter a name','error');return;}
    if(pin.length!==4)  {flash('PIN must be 4 digits','error');return;}
    if(players.some(p=>p.name.toLowerCase()===name.trim().toLowerCase())){flash('Player already exists','error');return;}
    try{
      await db.collection('players').add({name:name.trim(),pin,active:true,createdAt:STS()});
      flash(`✓ ${name.trim()} added — PIN: ${pin}`);
      setName('');setPin('');
    }catch(e){flash(e.message,'error');}
  }

  async function toggle(p){ try{await db.collection('players').doc(p.id).update({active:p.active===false});}catch(e){flash(e.message,'error');} }

  async function resetPin(p){
    const np=String(Math.floor(1000+Math.random()*9000));
    try{await db.collection('players').doc(p.id).update({pin:np});flash(`✓ ${p.name} new PIN: ${np}`);}catch(e){flash(e.message,'error');}
  }

  async function del(p){
    const n=picks.filter(pk=>pk.playerId===p.id).length;
    if(!confirm(`Delete ${p.name}?${n>0?` Their ${n} pick(s) stay in the database.`:''}`))return;
    try{await db.collection('players').doc(p.id).delete();}catch(e){flash(e.message,'error');}
  }

  return (
    <div>
      <div className="card">
        <div className="card-title">Add player</div>
        <div className="grid-2">
          <div className="form-group" style={{marginBottom:0}}><label className="form-label">Name</label><input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Full name" /></div>
          <div className="form-group" style={{marginBottom:0}}><label className="form-label">4-digit PIN</label><input type="text" maxLength={4} value={pin} onChange={e=>setPin(e.target.value.replace(/\D/g,''))} placeholder="e.g. 4821" /></div>
        </div>
        {msg.text&&<div className={`alert alert-${msg.type}`} style={{marginTop:'0.75rem'}}>{msg.text}</div>}
        <button className="btn btn-primary" style={{marginTop:'0.875rem'}} onClick={add} disabled={!name.trim()||pin.length!==4}>Add player</button>
      </div>
      <div className="card">
        <div className="card-title">Players ({players.filter(p=>p.active!==false).length} active)</div>
        {players.length===0&&<p className="empty-state">No players yet.</p>}
        {[...players].sort((a,b)=>a.name.localeCompare(b.name)).map(p=>(
          <div key={p.id} className="p-row" style={{opacity:p.active===false?0.4:1}}>
            <span className="p-row-name">{p.name}</span>
            <span className="pin-chip">PIN: {p.pin}</span>
            <button className="btn btn-ghost btn-sm" onClick={()=>resetPin(p)}>New PIN</button>
            <button className={`btn btn-sm ${p.active===false?'btn-success':'btn-danger'}`} onClick={()=>toggle(p)}>{p.active===false?'Restore':'Remove'}</button>
            <button className="btn btn-danger btn-sm" onClick={()=>del(p)}>✕</button>
          </div>
        ))}
      </div>
    </div>
  );
}

function AdminSeries({ series }) {
  const blank={team1:'',team2:'',round:'1',conference:'East',tipOffTime:'',status:'open'};
  const [form,setForm]=useState(blank);
  const [msg,setMsg]  =useState({text:'',type:'success'});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  const flash=(text,type='success')=>{setMsg({text,type});setTimeout(()=>setMsg({text:'',type:'success'}),3500);};

  async function add() {
    if(!form.team1.trim()||!form.team2.trim()){flash('Enter both team names','error');return;}
    try{
      await db.collection('series').add({
        team1:form.team1.trim(),team2:form.team2.trim(),
        round:parseInt(form.round),conference:form.conference,
        status:form.status,
        tipOffTime:form.tipOffTime?TSFrom(form.tipOffTime):null,
        result:null,createdAt:STS()
      });
      flash(`✓ ${form.team1} vs ${form.team2} added`);
      setForm(blank);
    }catch(e){flash(e.message,'error');}
  }

  async function setStatus(s,status){ try{await db.collection('series').doc(s.id).update({status});}catch(e){flash(e.message,'error');} }
  async function del(s){ if(!confirm(`Delete "${s.team1} vs ${s.team2}"?`))return; try{await db.collection('series').doc(s.id).delete();}catch(e){flash(e.message,'error');} }

  return (
    <div>
      <div className="card">
        <div className="card-title">Add series</div>
        <div className="grid-2">
          <div className="form-group"><label className="form-label">Team 1</label><input type="text" value={form.team1} onChange={e=>set('team1',e.target.value)} placeholder="e.g. Detroit" /></div>
          <div className="form-group"><label className="form-label">Team 2</label><input type="text" value={form.team2} onChange={e=>set('team2',e.target.value)} placeholder="e.g. Philadelphia" /></div>
          <div className="form-group"><label className="form-label">Round</label><select value={form.round} onChange={e=>set('round',e.target.value)}>{Object.entries(ROUND_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}</select></div>
          <div className="form-group"><label className="form-label">Conference</label><select value={form.conference} onChange={e=>set('conference',e.target.value)}><option>East</option><option>West</option><option>Finals</option></select></div>
        </div>
        <div className="form-group"><label className="form-label">Initial status</label><select value={form.status} onChange={e=>set('status',e.target.value)}><option value="open">Open — picks allowed immediately</option><option value="pending">Pending — not open yet</option></select></div>
        <div className="form-group"><label className="form-label">Game 1 tip-off — picks auto-lock at this time</label><input type="datetime-local" value={form.tipOffTime} onChange={e=>set('tipOffTime',e.target.value)} /></div>
        {msg.text&&<div className={`alert alert-${msg.type}`}>{msg.text}</div>}
        <button className="btn btn-primary" onClick={add} disabled={!form.team1.trim()||!form.team2.trim()}>Add series</button>
      </div>
      <div className="card">
        <div className="card-title">All series</div>
        {series.length===0&&<p className="empty-state">No series yet.</p>}
        {[...series].sort((a,b)=>a.round-b.round).map(s=>{
          const status=getStatus(s);
          return (
            <div key={s.id} className="admin-s-item">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'0.625rem'}}>
                <div><div style={{fontWeight:600,fontSize:'0.9rem'}}>{s.team1} vs {s.team2}</div><div style={{fontSize:'0.7rem',color:'var(--muted)',marginTop:2}}>{ROUND_LABEL[s.round]} · {s.conference}</div></div>
                <span className={`badge badge-${status}`}>{status}</span>
              </div>
              <div className="btn-row">
                {s.status!=='open'   &&<button className="btn btn-success btn-sm" onClick={()=>setStatus(s,'open')}>Open picks</button>}
                {s.status==='open'   &&<button className="btn btn-danger  btn-sm" onClick={()=>setStatus(s,'locked')}>Lock picks</button>}
                {s.status==='locked' &&<button className="btn btn-ghost   btn-sm" onClick={()=>setStatus(s,'open')}>Re-open</button>}
                {s.status!=='pending'&&s.status!=='completed'&&<button className="btn btn-ghost btn-sm" onClick={()=>setStatus(s,'pending')}>Pending</button>}
                <button className="btn btn-danger btn-sm" onClick={()=>del(s)}>Delete</button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function AdminResults({ series }) {
  const [res,setRes]=useState({});
  const [msg,setMsg]=useState({text:'',type:'success'});
  const setR=(id,k,v)=>setRes(prev=>({...prev,[id]:{...(prev[id]||{}),[k]:v}}));
  const flash=(text,type='success')=>{setMsg({text,type});setTimeout(()=>setMsg({text:'',type:'success'}),3500);};

  const eligible=[...series].filter(s=>s.status==='locked'||s.status==='completed'||getStatus(s)==='locked').sort((a,b)=>a.round-b.round);

  async function save(s) {
    const r=res[s.id]||{};
    const winner=r.winner!==undefined?r.winner:s.result?.winner;
    const games =r.games !==undefined?r.games :s.result?.games;
    if(!winner){flash('Select the winning team','error');return;}
    if(!games) {flash('Select games played','error');return;}
    try{
      await db.collection('series').doc(s.id).update({
        status:'completed',
        result:{winner,games:Number(games),mvp:(r.mvp!==undefined?r.mvp:s.result?.mvp)||''}
      });
      flash(`✓ ${s.team1} vs ${s.team2} saved — points recalculated`);
      setRes(prev=>{const n={...prev};delete n[s.id];return n;});
    }catch(e){flash(e.message,'error');}
  }

  return (
    <div>
      {msg.text&&<div className={`alert alert-${msg.type}`}>{msg.text}</div>}
      {eligible.length===0
        ?<div className="alert alert-info">No locked series yet. Lock a series in the Series tab first.</div>
        :eligible.map(s=>{
          const r=res[s.id]||{};
          const done=s.status==='completed'&&s.result;
          const winner=r.winner!==undefined?r.winner:(done?s.result.winner:null);
          const games =r.games !==undefined?r.games :(done?Number(s.result.games):null);
          const mvp   =r.mvp   !==undefined?r.mvp   :(done?s.result.mvp:'');
          return (
            <div key={s.id} className="card">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'0.875rem'}}>
                <div><div style={{fontWeight:600}}>{s.team1} vs {s.team2}</div><div style={{fontSize:'0.72rem',color:'var(--muted)',marginTop:2}}>{ROUND_LABEL[s.round]}</div></div>
                {done&&<span style={{fontSize:'0.8rem',color:'var(--green)',fontWeight:600}}>✓ {s.result.winner} in {s.result.games}</span>}
              </div>
              <div className="form-label">Winner</div>
              <div className="pick-opts" style={{marginBottom:'0.75rem'}}>
                {[s.team1,s.team2].map(t=><div key={t} className={`pick-opt ${winner===t?'sel':''}`} onClick={()=>setR(s.id,'winner',t)}>{t}</div>)}
              </div>
              <div className="form-label">Games played</div>
              <div className="games-opts" style={{marginBottom:'0.875rem'}}>
                {[4,5,6,7].map(g=><div key={g} className={`games-opt ${games===g?'sel':''}`} onClick={()=>setR(s.id,'games',g)}>{g}</div>)}
              </div>
              {s.round===4&&(
                <div className="form-group"><label className="form-label">Finals MVP</label><input type="text" placeholder="Player name..." value={mvp} onChange={e=>setR(s.id,'mvp',e.target.value)} /></div>
              )}
              <button className="btn btn-primary" onClick={()=>save(s)}>{done?'Update result':'Save result & calculate points'}</button>
            </div>
          );
        })
      }
    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
if (!db) {
  const el = document.getElementById('root');
  if (el) el.innerHTML = '<div class="splash"><div class="splash-icon">⚠️</div><div class="splash-title">Firebase failed to load</div><div class="splash-sub" style="color:#fca5a5">Check the console for details and reload the page.</div></div>';
} else {
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
</script>
